server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  mvc:
    view:
      prefix: /WEB-INF/views/
      suffix: .jsp
  web:
    error:
      path: /error
      whitelabel:
        enabled: false

mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.project.nuclear.model
  configuration:
    map-underscore-to-camel-case: true
